<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .sale-card { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2ecc71; }
        .ad-section { background: #e8f4fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Grace's Sales Tracker</h1>
    
    <div class="ad-section">
        <h3>📢 Ad Generator</h3>
        <p>Copy this for WhatsApp:</p>
        <textarea id="adText" style="width:100%; height:80px;">🚀 Little Dot Data Specials! 🚀
2GB @ GHS 11 | 3GB @ GHS 15 | 4GB @ GHS 21
Fast delivery to all networks! Order here: [YOUR RENDER LINK]</textarea>
    </div>

    <h3>Recent Orders</h3>
    {% for sale in sales %}
    <div class="sale-card">
        <strong>{{ sale.size }}</strong> - GHS {{ sale.price }}<br>
        To: {{ sale.phone }} | Code: {{ sale.code }}
    </div>
    {% else %}
    <p>No sales yet today. Keep pushing!</p>
    {% endfor %}
    
    <br>
    <a href="/">Go to Store</a>
</body>
</html>
