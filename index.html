<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspect Juniors Vendors</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .price { color: green; font-weight: bold; }
        button { background: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>
    <h1>Our Services</h1>
    
    {% for item in items %}
    <div class="card">
        <h3>{{ item.name }}</h3>
        <p>{{ item.desc }}</p>
        <p class="price">{{ item.price }}</p>
        <button onclick="alert('Order sent to WhatsApp!')">Order Now</button>
    </div>
    {% endfor %}
</body>
</html>
